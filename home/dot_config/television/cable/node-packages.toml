[metadata]
name = "node-packages"
description = "Browse local node_modules dependencies"
requirements = ["node"]

[source]
command = "ls node_modules | where type == dir | get name | each { path basename } | where { not ($in | str starts-with '.') } | str join '\n'"
output = "{}"

[preview]
command = "jq '{name, version, description, license, homepage, main}' node_modules/{}/package.json 2>/dev/null | bat --language json --color=always --plain --paging=never"

[actions.readme]
description = "View the package README"
command = "cat node_modules/{}/README.md 2>/dev/null | less"
mode = "execute"

[actions.homepage]
description = "Open the package homepage"
command = "node -e \"const p=require('./node_modules/{}/package.json'); const u=p.homepage||'https://www.npmjs.com/package/'+p.name; require('child_process').exec('xdg-open '+u)\""
mode = "fork"
